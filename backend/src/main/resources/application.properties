# Application
spring.application.name=wheel-of-doom

# H2 File-Based Database (persists across restarts)
spring.datasource.url=jdbc:h2:file:./data/wheelofdoom;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# H2 Console (development only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT — CHANGE THESE BEFORE ANY REAL DEPLOYMENT
# Secret must be a Base64-encoded string of at least 256 bits (32 bytes).
